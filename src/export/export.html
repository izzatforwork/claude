<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Export SOP</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        max-width: 640px;
        margin: 40px auto;
        padding: 0 20px;
        color: #0f172a;
      }
      button {
        padding: 10px 18px;
        font-size: 14px;
        font-weight: 600;
        color: #fff;
        background: #16a34a;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }
      button:disabled {
        background: #94a3b8;
        cursor: default;
      }
      #summary {
        margin: 16px 0;
      }
      #error {
        color: #dc2626;
      }
    </style>
  </head>
  <body>
    <h1>Export SOP</h1>
    <div id="summary">Loading…</div>
    <button id="download-btn" disabled>Download .docx</button>
    <p id="error"></p>
    <script src="export.js"></script>
  </body>
</html>
