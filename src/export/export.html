<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Export</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        max-width: 640px;
        margin: 40px auto;
        padding: 0 20px;
        color: #0f172a;
      }
      button {
        padding: 10px 18px;
        font-size: 14px;
        font-weight: 600;
        color: #fff;
        background: #16a34a;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }
      button:disabled {
        background: #94a3b8;
        cursor: default;
      }
      input {
        padding: 8px 12px;
        font-size: 14px;
        border: 1px solid #cbd5e1;
        border-radius: 4px;
        width: 100%;
        box-sizing: border-box;
        margin-bottom: 12px;
      }
      .screen {
        display: none;
      }
      .screen.active {
        display: block;
      }
      #summary {
        margin: 16px 0;
      }
      #error {
        color: #dc2626;
      }
      .part-title-input,
      .doc-title-input {
        margin-bottom: 20px;
      }
      .part-title-input label,
      .doc-title-input label {
        display: block;
        font-weight: 600;
        margin-bottom: 6px;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <!-- Screen 1: Document + Part Titles -->
    <div id="screen-titles" class="screen active">
      <h1>Document Details</h1>
      <div class="doc-title-input">
        <label for="doc-title-input">Document Title</label>
        <input type="text" id="doc-title-input" />
      </div>
      <div id="titles-form"></div>
      <button id="continue-btn">Continue to Download</button>
      <p id="error"></p>
    </div>

    <!-- Screen 2: Download -->
    <div id="screen-download" class="screen">
      <h1>Export</h1>
      <div id="summary">Loading…</div>
      <button id="download-btn" disabled>Download .docx</button>
      <p id="error"></p>
    </div>

    <script src="export.js"></script>
  </body>
</html>
